name: Prepare App Store Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to prepare (defaults to the branch MARKETING_VERSION)'
        required: false

jobs:
  prepare:
    name: Prepare App Store Version
    runs-on: macos-15
    environment: release
    if: github.actor == 'adborbas'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Prepare App Store version
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: bundle exec fastlane prepare_release version:"${{ inputs.version }}"
