name: 2 · Upload to TestFlight

on:
  workflow_dispatch:
    inputs:
      promo_screenshots:
        description: 'Also generate promo screenshots'
        type: boolean
        default: false

env:
  XCODE_VERSION: '26.2'

jobs:
  build:
    name: Upload to TestFlight
    runs-on: macos-15
    timeout-minutes: 60
    environment: release
    if: github.actor == 'adborbas'
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Set up Local.xcconfig
        run: |
          echo "DEVELOPMENT_TEAM = ${{ vars.DEVELOPMENT_TEAM }}" > Config/Local.xcconfig

      - name: Configure SSH for match certs repo
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.MATCH_DEPLOY_KEY }}" > ~/.ssh/match_ed25519
          chmod 600 ~/.ssh/match_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          echo -e "Host github.com\n  IdentityFile ~/.ssh/match_ed25519\n  IdentitiesOnly yes" >> ~/.ssh/config

      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        run: bundle exec fastlane beta

  promo-screenshots:
    name: Promo Screenshots
    runs-on: macos-15
    if: github.actor == 'adborbas' && inputs.promo_screenshots
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer

      # TODO: The script was written for local use and will need CI-friendly
      # xcodebuild flags (CODE_SIGN_IDENTITY="", CODE_SIGNING_REQUIRED=NO)
      # passed through to capture-screenshots.sh before this works on runners.
      - name: Generate promo screenshots
        run: ./scripts/generate-promo-screenshots.sh

      - name: Upload promo screenshots
        uses: actions/upload-artifact@v4
        with:
          name: promo-screenshots
          path: Screenshots/Promo/
